description: TI MSPM0 UART

compatible: "ti,mspm0-uart"

include: [uart-controller.yaml, pinctrl-device.yaml, base.yaml]

properties:
  reg:
    required: true

  interrupts:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  clk-div:
    type: int
    default: 1
    enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
    description: |
      Clock divider selection value.

  oversampling-rate:
    type: int
    default: 16
    enum:
      - 16
      - 8
      - 3
    description: |
      UART oversampling rate. Valid values are 16 (16x), 8 (8x), or 3 (3x).
      Default is 16 (16x oversampling).
